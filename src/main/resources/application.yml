spring:
  application:
    name: takt
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/takt}
    username: ${SPRING_DATASOURCE_USERNAME:takt}
    password: ${SPRING_DATASOURCE_PASSWORD:takt}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 2592000000

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    org.fr: DEBUG
    org.springframework.security: INFO
